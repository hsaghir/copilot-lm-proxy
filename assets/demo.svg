<svg xmlns="http://www.w3.org/2000/svg" width="754" height="350">
  <rect width="100%" height="100%" rx="8" fill="#1e1e2e"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="56" cy="15" r="6" fill="#28c840"/>
  <text x="377" y="17" fill="#6c7086" font-size="12" font-family="monospace" text-anchor="middle">copilot-proxy demo</text>
  <g transform="translate(20,50)">
    <text x="0" y="18" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#89b4fa">pip install copilot-lm-proxy</tspan></text>
    <text x="0" y="36" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">Successfully installed copilot-lm-proxy-0.1.0</text>
    <text x="0" y="72" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#89b4fa">python -c &quot;from copilot_proxy import ask; print(ask(&#x27;Hello!&#x27;))&quot;</tspan></text>
    <text x="0" y="90" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">Hello! How can I help you today?</text>
    <text x="0" y="126" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#89b4fa">python -c &quot;from copilot_proxy import ask; print(ask(&#x27;2+2?&#x27;, model=&#x27;gpt-4.1&#x27;))&quot;</tspan></text>
    <text x="0" y="144" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">4</text>
    <text x="0" y="180" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve"><tspan fill="#a6e3a1">$ </tspan><tspan fill="#89b4fa">python -c &quot;from copilot_proxy import list_models; [print(m[&#x27;id&#x27;]) for m in list_models()[:5]]&quot;</tspan></text>
    <text x="0" y="198" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">gpt-4.1</text>
    <text x="0" y="216" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">gpt-4o</text>
    <text x="0" y="234" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">claude-sonnet-4.6</text>
    <text x="0" y="252" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">claude-opus-4.6</text>
    <text x="0" y="270" fill="#cdd6f4" font-size="14" font-family="Menlo,Monaco,Consolas,monospace" xml:space="preserve">gemini-2.5-pro</text>
  </g>
</svg>
